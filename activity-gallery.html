<style>
body{font-family:"Noto Sans TC",sans-serif;margin:0;background:#f6f7fb;color:#333;line-height:1.7}
.topbar{background:#e9edf7;padding:8px 0;font-size:13px;overflow:hidden;white-space:nowrap}
.topbar-track{display:inline-flex;align-items:center;gap:42px;white-space:nowrap;font-weight:700;animation:topbarMarquee 24s linear infinite;padding-left:100%}
.topbar-time{color:#c62828;font-weight:700}
.topbar-link{display:inline-block;color:#333;text-decoration:none}
.topbar-link:hover{text-decoration:underline}
@keyframes topbarMarquee{0%{transform:translateX(0)}100%{transform:translateX(-100%)}}
header{background:#fff;border-bottom:1px solid #e5e5e5;position:sticky;top:0;z-index:20}
.header-inner{max-width:1280px;margin:auto;padding:12px 18px;position:relative}
.header-top{display:flex;align-items:center;justify-content:center}
.logo{font-size:28px;font-weight:700;color:#8b1e2d;letter-spacing:1px;display:flex;align-items:center;gap:45px}
.logo img{height:65px;width:auto;display:block}
.quick-links{position:absolute;top:14px;right:18px;display:flex;gap:12px}
.quick-links a{color:#1f5ea8;text-decoration:none;font-weight:600;font-size:14px}
.quick-links a:hover{text-decoration:underline}
.menu-btn{position:absolute;top:14px;left:18px;z-index:25;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;justify-content:center;padding:4px}
.menu-btn span{display:block;width:26px;height:3px;background:#333;margin:4px 0;transition:0.4s}
#sidebar{width:0;position:fixed;top:0;left:0;height:100%;overflow-x:hidden;overflow-y:auto;transition:0.4s ease-in-out;padding-top:80px;background:linear-gradient(180deg, #f8f9fa 0%, #e9ecef 100%);box-shadow:4px 0 20px rgba(0,0,0,.3);z-index:30;border-radius:0 12px 12px 0}
#sidebar a{padding:9px 20px;text-decoration:none;font-size:14px;line-height:1.15;color:#333;display:block;transition:0.3s ease;font-family:"KaiTi","楷體",serif;border-bottom:1px solid rgba(0,0,0,.05);word-break:normal;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#sidebar a:hover{background:linear-gradient(90deg, #8b1e2d 0%, #c23c53 100%);color:#fff;transform:translateX(5px);box-shadow:2px 0 8px rgba(0,0,0,.2)}
#sidebar .closebtn{display:none}
#sidebar .closebtn:hover{color:#c23c53}
.hero{position:relative}
.hero-main{width:100%;height:68vh;min-height:380px;object-fit:cover;display:block}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(rgba(0,0,0,.20),rgba(0,0,0,.35));display:flex;align-items:flex-end;justify-content:center;text-align:center;padding:20px;padding-bottom:80px}
.lotus-bg{position:absolute;inset:0;overflow:hidden;pointer-events:none}
.lotus{position:absolute;width:120px;opacity:.12;animation:floatLotus 22s linear infinite;border-radius:18px;filter:saturate(.9)}
.lotus:nth-child(1){left:8%;animation-duration:26s}
.lotus:nth-child(2){left:28%;animation-duration:21s}
.lotus:nth-child(3){left:56%;animation-duration:24s}
.lotus:nth-child(4){left:78%;animation-duration:28s}
@keyframes floatLotus{0%{transform:translateY(105vh) scale(.85);opacity:0}15%{opacity:.1}85%{opacity:.12}100%{transform:translateY(-160px) scale(1.08);opacity:0}}
@keyframes goldGlow{0%{text-shadow:0 0 8px rgba(255,215,0,.25),0 2px 10px rgba(0,0,0,.6)}50%{text-shadow:0 0 22px rgba(255,215,0,.48),0 2px 10px rgba(0,0,0,.65)}100%{text-shadow:0 0 8px rgba(255,215,0,.25),0 2px 10px rgba(0,0,0,.6)}}
@keyframes fadeInUp{0%{opacity:0;transform:translateY(30px)}100%{opacity:1;transform:translateY(0)}}
.hero-text{color:#fff;max-width:900px;line-height:1.1;animation:fadeInUp 2s ease-out}
.hero-text h1{font-size:52px;margin:0 0 6px;animation:goldGlow 3.2s ease-in-out infinite}
.hero-text p{margin:0;line-height:1.2}
.container{max-width:1200px;margin:auto;padding:56px 20px;border-radius:0;margin-top:18px;margin-bottom:18px}
#activity-section{background-image:linear-gradient(rgba(255,255,255,.76),rgba(255,255,255,.76)),url("背景底圖.jpg");background-size:cover;background-position:center;background-repeat:no-repeat}

#master{background:rgba(248,245,255,0.9)}
#news{background:rgba(255,245,247,0.92)}
#events{background:rgba(255,250,245,0.92)}
#calendar-section{background:rgba(245,250,255,0.92)}

.section-title{text-align:center;margin-bottom:34px}
.section-title h2{font-size:32px;color:#8b1e2d;margin:0 0 8px}.section-title p{color:#666;margin:0}
.brand-share{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:12px;flex-wrap:wrap}
.brand-share-icon{width:42px;height:42px;border-radius:12px;display:inline-flex;align-items:center;justify-content:center;color:#fff;text-decoration:none;box-shadow:0 4px 10px rgba(0,0,0,.18)}
.brand-share-icon i{font-size:20px;line-height:1}

.brand-share-icon.fb{background:#1877f2}

.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:24px}
.card{background:#fff;border-radius:14px;padding:26px;box-shadow:0 8px 24px rgba(0,0,0,.08)}
.news-item{border-bottom:1px solid #eee;padding:18px 22px}.news-item:last-child{border-bottom:none}.date{color:#888;font-size:13px;margin-bottom:6px}
.event{background:#fff7f7;border-left:5px solid #c23c53;padding:18px;border-radius:10px;box-shadow:0 6px 18px rgba(0,0,0,.05)}
.event h3{margin:0 0 10px}
.calendar-wrap{background:#fff;border-radius:14px;padding:26px;box-shadow:0 8px 24px rgba(0,0,0,.08)}
.calendar-toolbar{display:flex;align-items:center;justify-content:center;gap:12px;flex-wrap:wrap;margin-bottom:16px}
.calendar-toolbar button{background:#8b1e2d;color:#fff;border:none;padding:10px 16px;border-radius:8px;cursor:pointer}
#monthTitle{margin:0;font-size:24px;color:#8b1e2d}
.calendar-week{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:6px}
.calendar-week div{background:#8b1e2d;color:#fff;text-align:center;padding:10px 0;border-radius:8px;font-weight:600}
#calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.calendar-cell{border:1px solid #e3e3e3;border-radius:10px;min-height:110px;padding:8px;background:#fff}
.calendar-cell strong{display:block;margin-bottom:4px}
.calendar-cell.has-event{background:#e3f2fd}
.calendar-event{display:block;background:#f0f8ff;color:#1565c0;font-size:12px;padding:3px 6px;border-radius:6px;margin-top:4px}
.signup-btn{display:inline-block;background:#1565c0;color:#fff;border:none;border-radius:4px;cursor:pointer}
.gallery{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:16px}
.gallery figure{margin:0;background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 8px 24px rgba(0,0,0,.08)}
.gallery img{width:100%;height:120px;object-fit:cover;display:block}
.gallery figcaption{padding:10px 12px;font-weight:600;color:#1565c0;text-align:center}
.info-list{margin:0;padding-left:22px;line-height:1.35}
.info-list li{margin-bottom:8px}
.donate{background:linear-gradient(135deg,#8b1e2d,#c23c53);color:#fff;text-align:center;padding:54px 20px}.btn{display:inline-block;background:#fff;color:#8b1e2d;padding:12px 26px;border-radius:8px;text-decoration:none;font-weight:700;margin-top:12px}
.contact{background:#f1f3f9}
.qr-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,160px));gap:14px;justify-content:center;margin-top:20px}
.qr-card{background:#fff;border-radius:12px;padding:10px;box-shadow:0 6px 18px rgba(0,0,0,.06);text-align:center}
.qr-card img{width:100px;height:100px;object-fit:contain;background:#fff}
.qr-card p{font-size:13px;margin:8px 0 0;color:#8b1e2d;font-weight:600}
footer{background:#1f5ea8;color:#fff;text-align:center;padding:28px}
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.82);display:none;align-items:center;justify-content:center;padding:20px;z-index:9999}.lightbox.open{display:flex}.lightbox img{max-width:min(92vw,1100px);max-height:88vh;border-radius:12px;box-shadow:0 10px 30px rgba(0,0,0,.35)}.lightbox-close{position:absolute;top:18px;right:22px;background:#fff;color:#8b1e2d;border:none;border-radius:999px;width:42px;height:42px;font-size:24px;cursor:pointer}
.small-note{font-size:13px;color:#666;text-align:center;margin-top:12px}
@media(max-width:600px){
body{background-attachment:scroll}
.topbar{font-size:12px}
.topbar-track{gap:30px}
.header-inner{padding:10px 12px}
.header-top{justify-content:flex-start;padding-left:54px;padding-right:6px}
.menu-btn{position:fixed;top:12px;left:12px;z-index:35;background:rgba(255,255,255,.94);border:1px solid #ddd;border-radius:10px;padding:6px;box-shadow:0 4px 12px rgba(0,0,0,.15)}
header{position:static}
.logo{font-size:20px;line-height:1.3;text-align:center;gap:12px}
.logo img{height:54px}
#sidebar a{font-size:13px;padding:8px 14px;line-height:1.1}
.quick-links{position:static;display:flex;flex-direction:row;justify-content:center;align-items:center;gap:10px;margin:0 0 6px;padding-left:46px;white-space:nowrap}
.quick-links a{font-size:12px;line-height:1.2}
.hero-main{height:46vh;min-height:260px}
.hero-overlay{padding:14px;padding-bottom:30px}
.hero-text h1{font-size:30px;letter-spacing:2px}
.hero-text p{font-size:15px}
.container{padding:28px 12px;border-radius:0;margin-top:12px;margin-bottom:12px}
.section-title{margin-bottom:20px}
.section-title h2{font-size:24px}
.section-title p{font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.brand-share{gap:8px;margin-top:10px}
.brand-share-icon{width:36px;height:36px}
.brand-share-icon i{font-size:16px}
.grid{grid-template-columns:1fr;gap:14px}
.card{padding:18px;border-radius:12px}
.news-item{padding:14px 16px}
.event{padding:14px}
.calendar-wrap{padding:16px}
.calendar-toolbar{gap:8px}
}
</style>

      <a class="brand-share-icon line" href="#" target="_self" rel="noopener noreferrer" aria-label="分享到LINE"><i class="fa-brands fa-line" aria-hidden="true"></i></a>
      <a class="brand-share-icon fb" href="#" target="_self" rel="noopener noreferrer" aria-label="分享到Facebook"><i class="fa-brands fa-facebook-f" aria-hidden="true"></i></a>
      <a class="brand-share-icon ig" href="https://www.instagram.com/" target="_blank" rel="noopener noreferrer" aria-label="Instagram"><i class="fa-brands fa-instagram" aria-hidden="true"></i></a>

<script>
function setupTopbarSignupLinks(defaultYear){
  document.querySelectorAll('.topbar-signup').forEach(link => {
    const timeNode = link.querySelector('.topbar-time');
    if(!timeNode) return;
    const matched = timeNode.textContent.match(/(\d{1,2})\/(\d{1,2})/);
    if(!matched) return;
    const month = String(parseInt(matched[1],10)).padStart(2,'0');
    const day = String(parseInt(matched[2],10)).padStart(2,'0');
    link.href = `event-signup.html?date=${defaultYear}-${month}-${day}`;
  });
}

function setupBrandShare(containerId, shareUrl){
  const container = document.getElementById(containerId);
  if(!container) return;
  const pageUrl = shareUrl || window.location.href;
  const encodedUrl = encodeURIComponent(pageUrl);
  const encodedShareText = encodeURIComponent(`${document.title}\n${pageUrl}`);
  const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

  function openAppOrFallback(appUrl, fallbackUrl){
    if(!isMobile){
      window.location.href = fallbackUrl;
      return;
    }
    const timer = setTimeout(() => {
      window.location.href = fallbackUrl;
    }, 900);
    const clearTimer = () => clearTimeout(timer);
    const onVisibility = () => {
      if(document.hidden) clearTimer();
    };
    window.addEventListener('pagehide', clearTimer, {once:true});
    document.addEventListener('visibilitychange', onVisibility, {once:true});
    window.location.href = appUrl;
  }

  const lineLink = container.querySelector('.brand-share-icon.line');
  const fbLink = container.querySelector('.brand-share-icon.fb');
  if(lineLink){
    const lineHref = `https://line.me/R/msg/text/?${encodedShareText}`;
    const lineAppHref = `line://msg/text/${encodedShareText}`;
    lineLink.href = lineHref;
    lineLink.addEventListener('click', (event) => {
      event.preventDefault();
      openAppOrFallback(lineAppHref, lineHref);
    });
  }
  if(fbLink){
    const fbHref = `https://www.facebook.com/sharer/sharer.php?u=${encodedUrl}`;
    const fbAppHref = `fb://facewebmodal/f?href=${encodeURIComponent(fbHref)}`;
    fbLink.href = fbHref;
    fbLink.addEventListener('click', (event) => {
      event.preventDefault();
      openAppOrFallback(fbAppHref, fbHref);
    });
  }
}

const photos=[
  {src:"活動1.jpg",caption:"靜坐"},
  {src:"活動2.jpg",caption:"梁皇寶懺法會"},
  {src:"活動9.jpg",caption:"梁皇寶懺法會"},
  {src:"活動3.jpg",caption:"初一十五共修"},
  {src:"活動4.jpg",caption:"初一十五共修"},
  {src:"活動8.jpg",caption:"初一十五共修"},
  {src:"活動5.jpg",caption:"瑜伽焰口法會"},
  {src:"活動10.jpg",caption:"中元普施"},
  {src:"活動6.jpg",caption:"活動照片"},
  {src:"活動7.jpg",caption:"活動照片"},
];
function renderGallery(){
  const gallery=document.getElementById('gallery');
  photos.forEach(photo=>{
    const figure=document.createElement('figure');
    const img=document.createElement('img');
    const figcaption=document.createElement('figcaption');
    img.src=photo.src;
    img.alt=photo.caption;
    img.addEventListener('click',()=>openLightbox(photo.src,photo.caption));
    figcaption.textContent=photo.caption;
    figure.appendChild(img);
    figure.appendChild(figcaption);
    gallery.appendChild(figure);
  });
}
function openLightbox(src,alt){
  const box=document.getElementById('lightbox');
  const boxImg=document.getElementById('lightboxImg');
  boxImg.src=src;
  boxImg.alt=alt;
  box.classList.add('open');
}
function closeLightbox(event){
  if(event.target.id==='lightbox'||event.target.classList.contains('lightbox-close')){
    document.getElementById('lightbox').classList.remove('open');
  }
}
document.addEventListener('keydown',(event)=>{
  if(event.key==='Escape'){
    document.getElementById('lightbox').classList.remove('open');
  }
});
renderGallery();
setupBrandShare('shareActivityGallery', window.location.href.split('#')[0]);
setupTopbarSignupLinks(2026);

let sidebarTimer = null;
function openSidebar(){
  const sb = document.getElementById('sidebar');
  if(!sb) return;
  sb.style.width = '220px';
  if(sidebarTimer) clearTimeout(sidebarTimer);
  sidebarTimer = setTimeout(closeSidebar,10000);
}
function closeSidebar(){
  const sb = document.getElementById('sidebar');
  if(sb) sb.style.width = '0';
  if(sidebarTimer){clearTimeout(sidebarTimer);sidebarTimer=null;}
}
document.getElementById('menuBtn').addEventListener('click', openSidebar);
document.getElementById('closeBtn').addEventListener('click', closeSidebar);
document.querySelectorAll('#sidebar a:not(.closebtn)').forEach(link=>{
  link.addEventListener('click', closeSidebar);
});
</script>
