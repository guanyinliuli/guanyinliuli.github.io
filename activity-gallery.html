<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>活動照片 - 觀音琉璃道場</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
body{font-family:"Noto Sans TC",sans-serif;margin:0;background:#f6f7fb;color:#333;line-height:1.7}
.topbar{background:#e9edf7;padding:8px 20px;font-size:13px;text-align:right}
header{background:#fff;border-bottom:1px solid #e5e5e5;position:sticky;top:0;z-index:20}
.header-inner{max-width:1280px;margin:auto;padding:12px 18px}
.header-top{display:flex;align-items:center;justify-content:center}
.logo{font-size:28px;font-weight:700;color:#8b1e2d;letter-spacing:1px}
nav{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-top:12px}
nav a{text-decoration:none;color:#333;font-weight:500;font-size:14px;white-space:nowrap;padding:8px 12px;border-radius:999px;background:#f7ebee}
nav a:hover{color:#8b1e2d;background:#f2d9df}
nav a.active{color:#fff;background:#8b1e2d}
.container{max-width:1200px;margin:auto;padding:56px 20px;border-radius:22px;margin-top:18px;margin-bottom:18px}
#activity-section{background:rgba(255,250,245,0.92)}
.section-title{text-align:center;margin-bottom:34px}
.section-title h2{font-size:32px;color:#8b1e2d;margin:0 0 8px}
.section-title p{color:#666;margin:0}
.gallery{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px}
.gallery figure{margin:0;background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 8px 24px rgba(0,0,0,.08);cursor:zoom-in}
.gallery img{width:100%;height:180px;object-fit:cover;display:block}
.gallery figcaption{padding:10px 12px;font-weight:600;color:#8b1e2d;text-align:center}
footer{background:#5f1220;color:#fff;text-align:center;padding:28px}
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.82);display:none;align-items:center;justify-content:center;padding:20px;z-index:9999}
.lightbox.open{display:flex}
.lightbox img{max-width:min(92vw,1100px);max-height:88vh;border-radius:12px;box-shadow:0 10px 30px rgba(0,0,0,.35)}
.lightbox-close{position:absolute;top:18px;right:22px;background:#fff;color:#8b1e2d;border:none;border-radius:999px;width:42px;height:42px;font-size:24px;cursor:pointer}
@media(max-width:600px){
.topbar{font-size:12px;padding:7px 12px;text-align:center}
.header-inner{padding:10px 12px}
.logo{font-size:21px;line-height:1.3;text-align:center}
nav{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin-top:10px}
nav a{font-size:13px;padding:9px 8px;text-align:center}
.container{padding:28px 12px;border-radius:16px;margin-top:12px;margin-bottom:12px}
.section-title{margin-bottom:20px}
.section-title h2{font-size:24px}
.section-title p{font-size:14px}
.gallery{grid-template-columns:1fr 1fr;gap:10px}
.gallery img{height:130px}
}
@media(max-width:480px){
.gallery{grid-template-columns:1fr}
.gallery img{height:180px}
}
</style>
</head>
<body>

<div class="topbar">歡迎蒞臨觀音琉璃道場官方網站</div>

<header>
  <div class="header-inner">
    <div class="header-top">
      <div class="logo">觀音琉璃道場</div>
    </div>
    <nav>
      <a href="index.html#home">首頁</a>
      <a href="index.html#about">道場介紹</a>
      <a href="index.html#master">創辦人湛願法師</a>
      <a href="index.html#news">最新公告</a>
      <a href="index.html#events">法會活動</a>
      <a href="activity-gallery.html" class="active">活動照片</a>
      <a href="index.html#practice">念佛禪修與靜坐</a>
      <a href="index.html#plaque">消災與超薦牌位</a>
      <a href="index.html#release">放生</a>
      <a href="index.html#lamp">點燈</a>
      <a href="index.html#charity">慈善基金</a>
      <a href="index.html#contact">聯絡我們</a>
      <a href="index.html#traffic">交通資訊</a>
    </nav>
  </div>
</header>

<section class="container" id="activity-section">
  <div class="section-title">
    <h2>活動照片</h2>
    <p>道場法會與共修活動精彩瞬間</p>
  </div>
  <div class="gallery" id="gallery">
  </div>
</section>

<div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
  <button class="lightbox-close" type="button" aria-label="關閉">×</button>
  <img id="lightboxImg" src="" alt="放大圖片">
</div>

<footer><p>© 2026觀音琉璃道場</p></footer>

<script>
const photos=[
  {src:"活動1.jpg",caption:"靜坐"},
  {src:"活動2.jpg",caption:"梁皇寶懺法會"},
  {src:"活動3.jpg",caption:"初一十五共修"},
  {src:"活動4.jpg",caption:"初一十五共修"},
  {src:"活動5.jpg",caption:"瑜伽焰口法會"},
  {src:"活動6.jpg",caption:"活動照片"},
  {src:"活動7.jpg",caption:"活動照片"},
  {src:"活動8.jpg",caption:"活動照片"},
  {src:"活動9.jpg",caption:"活動照片"},
  {src:"活動10.jpg",caption:"活動照片"},
  {src:"活動11.jpg",caption:"活動照片"},
  {src:"活動12.jpg",caption:"活動照片"},
  {src:"活動13.jpg",caption:"活動照片"},
  {src:"活動14.jpg",caption:"活動照片"},
  {src:"活動15.jpg",caption:"活動照片"},
  {src:"活動16.jpg",caption:"活動照片"},
  {src:"活動17.jpg",caption:"活動照片"}
];
function renderGallery(){
  const gallery=document.getElementById('gallery');
  photos.forEach(photo=>{
    const figure=document.createElement('figure');
    const img=document.createElement('img');
    const figcaption=document.createElement('figcaption');
    img.src=photo.src;
    img.alt=photo.caption;
    img.addEventListener('click',()=>openLightbox(photo.src,photo.caption));
    figcaption.textContent=photo.caption;
    figure.appendChild(img);
    figure.appendChild(figcaption);
    gallery.appendChild(figure);
  });
}
function openLightbox(src,alt){
  const box=document.getElementById('lightbox');
  const boxImg=document.getElementById('lightboxImg');
  boxImg.src=src;
  boxImg.alt=alt;
  box.classList.add('open');
}
function closeLightbox(event){
  if(event.target.id==='lightbox'||event.target.classList.contains('lightbox-close')){
    document.getElementById('lightbox').classList.remove('open');
  }
}
document.addEventListener('keydown',(event)=>{
  if(event.key==='Escape'){
    document.getElementById('lightbox').classList.remove('open');
  }
});
renderGallery();
</script>

</body>
</html>
