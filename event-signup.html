<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>活動報名</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
body{font-family:"Noto Serif TC",serif;margin:0;background:#f6f7fb;color:#333;line-height:1.7}
.topbar{background:#e9edf7;padding:8px 0;font-size:13px;overflow:hidden;white-space:nowrap}
.topbar-track{display:inline-flex;align-items:center;gap:42px;white-space:nowrap;font-weight:700;animation:topbarMarquee 24s linear infinite;padding-left:100%}
.topbar-time{color:#c62828;font-weight:700}
.topbar-link{display:inline-block;color:#333;text-decoration:none}
.topbar-link:hover{text-decoration:underline}
@keyframes topbarMarquee{0%{transform:translateX(0)}100%{transform:translateX(-100%)}}
header{background:#fff;border-bottom:1px solid #e5e5e5;position:sticky;top:0;z-index:20}
.header-inner{max-width:1280px;margin:auto;padding:12px 18px;position:relative}
.header-top{display:flex;align-items:center;justify-content:center}
.logo{font-size:28px;font-weight:700;color:#8b1e2d;letter-spacing:1px;display:flex;align-items:center;gap:45px}
.logo img{height:65px;width:auto;display:block}
nav{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-top:12px}
nav a{text-decoration:none;color:#333;font-weight:500;font-size:14px;white-space:nowrap;padding:8px 12px;border-radius:999px;background:#f7ebee}
nav a:hover{color:#8b1e2d;background:#f2d9df}
nav a.active{color:#fff;background:#8b1e2d}
.quick-links{position:absolute;top:14px;right:18px;display:flex;gap:12px}
.quick-links a{color:#1f5ea8;text-decoration:none;font-weight:600;font-size:14px}
.quick-links a:hover{text-decoration:underline}
.container{max-width:1200px;margin:auto;padding:56px 20px;border-radius:0;margin-top:18px;margin-bottom:18px}
#signup-content{background:rgba(227,242,253,0.6)}
.section-title{text-align:center;margin-bottom:34px}
.section-title h2{font-size:32px;color:#8b1e2d;margin:0 0 8px}
.section-title p{color:#666;margin:0}
@keyframes slideInLeft{0%{opacity:0;transform:translateX(-30px)}100%{opacity:1;transform:translateX(0)}}
.poster{max-width:600px;display:block;margin:0 auto 24px;opacity:0;}
.form-link{display:block;text-align:center;margin-top:24px}
.form-link a{background:#8b1e2d;color:#fff;padding:12px 24px;border-radius:8px;text-decoration:none;font-weight:700}
footer{background:#1f5ea8;color:#fff;text-align:center;padding:28px}
@media(max-width:600px){
  .header-inner{padding:10px 12px 12px}
  .header-top{justify-content:flex-start;padding-left:54px;padding-right:6px}
  .logo{font-size:20px;gap:8px}
  .logo img{height:54px}
  .quick-links{position:static;display:flex;flex-direction:row;justify-content:center;align-items:center;gap:10px;margin:0 0 6px;padding-left:46px;white-space:nowrap}
  .quick-links a{font-size:12px;line-height:1.2}
  nav{display:flex;justify-content:center;gap:6px;margin-top:10px}
  nav a{font-size:12px;padding:6px 6px;text-align:center}
  .container{padding:28px 12px;border-radius:0;margin-top:12px;margin-bottom:12px}
  .section-title h2{font-size:24px}
  .section-title p{font-size:14px}
  .poster{max-width:100%;height:auto;margin-bottom:16px}
  .form-link a{padding:10px 20px;font-size:14px}
}
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-track">
    <a class="topbar-link topbar-signup" href="#">快訊｜<span class="topbar-time">4/6(一)早上9點</span>慶祝觀世音菩薩聖誕，特舉辦【禮拜八十八佛洪名寶懺】。(備有消災祈福祿位)，歡迎十方信眾報名參加！</a>
    <a class="topbar-link topbar-signup" href="#" aria-hidden="true">快訊｜<span class="topbar-time">4/6(一)早上9點</span> 慶祝觀世音菩薩聖誕，特舉辦【禮拜八十八佛洪名寶懺】。(備有消災祈福祿位)，歡迎十方信眾報名參加！</a>
  </div>
</div>
<header>
  <div class="header-inner">
    <div class="quick-links">
      <a href="index.html">回首頁</a>
      <a href="index.html#contact">聯絡我們</a>
      <a href="index.html#news">最新公告</a>
    </div>
    <div class="header-top">
      <div class="logo"><img src="logo.png" alt="">觀音琉璃道場</div>
    </div>
    <nav>
      <a id="backCalendarLink" href="index.html#calendar-section" class="btn">回法會行事曆</a>
    </nav>
  </div>
</header>
<section class="container" id="signup-content">
  <div class="section-title">
    <h2>活動報名</h2>
    <p id="subtext"></p>
  </div>
  <img src="" class="poster" id="poster" alt="活動海報" style="display:none;">
  <div class="form-link" id="formLink"></div>
</section>
<footer><p>© 2026觀音琉璃道場</p></footer>
<script>
function setupTopbarSignupLinks(defaultYear){
  document.querySelectorAll('.topbar-signup').forEach(link => {
    const timeNode = link.querySelector('.topbar-time');
    if(!timeNode) return;
    const matched = timeNode.textContent.match(/(\d{1,2})\/(\d{1,2})/);
    if(!matched) return;
    const month = String(parseInt(matched[1],10)).padStart(2,'0');
    const day = String(parseInt(matched[2],10)).padStart(2,'0');
    link.href = `event-signup.html?date=${defaultYear}-${month}-${day}`;
  });
}

function getQueryParam(name){
  const params=new URLSearchParams(window.location.search);
  return params.get(name);
}
const date=getQueryParam('date');
const monthFromQuery=getQueryParam('month');
const subtext=document.getElementById('subtext');
const poster=document.getElementById('poster');
const formLink=document.getElementById('formLink');
const backCalendarLink=document.getElementById('backCalendarLink');

const monthFromDate = date && /^\d{4}-\d{2}-\d{2}$/.test(date) ? date.slice(0,7) : '';
const targetMonth = monthFromQuery && /^\d{4}-\d{2}$/.test(monthFromQuery) ? monthFromQuery : monthFromDate;
if(backCalendarLink && targetMonth){
  backCalendarLink.href = `index.html?month=${targetMonth}#calendar-section`;
}
if(date){
  subtext.textContent=date+" 法會報名";
  // 海報與表單對應
  const posterMap={
    '2026-03-19':'3.19海報.png',
    '2026-03-29':'3.29海報.png',
    '2026-04-02':'4.2海報.png',
    '2026-04-06':'4.6海報.jpg',
    '2026-04-17':'4.17海報.png',
    '2026-05-01':'5.01海報.png',
    '2026-05-10':'5.10海報.png',
    '2026-05-31':'5.31海報.png',
    '2026-06-28':'6.28海報.jpg',
    '2026-08-01':'8.1海報.jpg',
    '2026-08-02':'8.2海報.jpg',
    '2026-09-13':'9.13海報.png',
    '2026-11-08':'11.8海報.png',
    '2026-12-12':'12.12海報.png',
    '2026-12-13':'12.13海報.png'
  };
  const formMap={
    '2026-03-19':'https://forms.gle/SbgcyLzSLgW2j13r8',
    '2026-03-29':'https://forms.gle/ptCJJisfvYWkpr9Z7',
    '2026-04-02':'https://forms.gle/pMLrrmiwr45twrgN6',
    '2026-04-06':'https://docs.google.com/forms/d/e/1FAIpQLSfWmldWRtzPBqtPmlHAEoCrjUtvexVus9KJHwM0kEnQ7IquNw/viewform',
    '2026-05-10':'https://forms.gle/4CLN2yqUszgnChK26',
    '2026-05-31':'https://forms.gle/JgCnjxNvRKhTpYMp9',
  };
  if(posterMap[date]){
    poster.src=posterMap[date];
    poster.style.display='block';
    poster.style.animation='slideInLeft 1s ease-out forwards';
  } else {
    poster.style.display='none';
  }
  if(formMap[date]){
    formLink.innerHTML=`<a href="${formMap[date]}" target="_blank">前往 ${date} 報名表單</a>`;
  } else {
    formLink.innerHTML=`<p>尚無對應報名連結。</p>`;
  }
} else {
  subtext.textContent='無效日期';
}
setupTopbarSignupLinks(2026);
</script>
</body>
</html>
